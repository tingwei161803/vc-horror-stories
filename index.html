<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ==== Primary meta ==== -->
  <title>創投恐怖故事 · VC Horror Stories</title>
  <meta name="description" content="一份雙語檔案,收錄創辦人在 X 上公開分享的「創投恐怖故事」—— 當場睡著的合夥人、性別偏見的拒絕、想拆散創始團隊的晚餐提議。有些人,直接點名。A curated, bilingual archive of founders' VC horror stories." />
  <link rel="canonical" href="https://example.com/" />
  <meta name="theme-color" content="#0c0a0d" />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%92%80%3C/text%3E%3C/svg%3E" />

  <!-- ==== Open Graph ==== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="創投恐怖故事 · VC Horror Stories" />
  <meta property="og:description" content="創辦人說出最不堪的募資惡夢 —— 有些人,直接點名。Founders share their worst pitch-room nightmares — and some are naming names." />
  <meta property="og:locale" content="zh_TW" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta property="og:url" content="https://example.com/" />
  <meta property="og:image" content="https://example.com/assets/og-image.png" />

  <!-- ==== Twitter ==== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="創投恐怖故事 · VC Horror Stories" />
  <meta name="twitter:description" content="創辦人說出最不堪的募資惡夢 —— 有些人,直接點名。" />
  <meta name="twitter:image" content="https://example.com/assets/og-image.png" />

  <!-- ==== JSON-LD structured data ==== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "創投恐怖故事 · VC Horror Stories",
    "inLanguage": ["zh-TW", "en"],
    "description": "A curated, bilingual archive of founders' public VC horror stories, sourced from a viral X thread and TechCrunch reporting.",
    "url": "https://example.com/",
    "isBasedOn": "https://techcrunch.com/2026/06/05/founders-share-vc-horror-stories-and-some-are-naming-names/",
    "creditText": "Stories belong to their original authors on X. Reporting by TechCrunch (Julie Bort)."
  }
  </script>

  <!-- ==== Fonts + icons (CDN, no local files) ==== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Flex:opsz,wght@8..144,400..700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- ==== App bar ==== -->
  <header class="appbar">
    <div class="appbar__inner">
      <a class="brand" href="#top" aria-label="VC Horror Stories">
        <span class="material-symbols-rounded brand__logo">skull</span>
        <span class="brand__text">
          <span class="brand__name" id="brandName">創投恐怖故事</span>
          <span class="brand__tag" id="brandTag">點名 · 雙語檔案</span>
        </span>
      </a>

      <div class="appbar__actions">
        <button class="icon-btn" id="langToggle" type="button"
                title="切換語言 / Toggle language" aria-label="Toggle language / 切換語言">
          <span class="material-symbols-rounded">translate</span>
          <span class="icon-btn__txt" id="langLabel">中</span>
        </button>

        <button class="icon-btn" id="themeToggle" type="button"
                title="切換主題 / Toggle theme" aria-label="Toggle theme / 切換主題">
          <span class="material-symbols-rounded" id="themeIcon">light_mode</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ==== Sticky section nav (auto-generated pills + scrollspy) ==== -->
  <nav class="sectionnav" id="sectionNav" aria-label="本頁導覽">
    <div class="sectionnav__inner" id="sectionNavInner"></div>
  </nav>

  <!-- ==== Composite sections (rendered in order from SITE_SECTIONS) ==== -->
  <main id="sections" aria-live="polite"></main>

  <!-- ==== Detail dialog (used by the stories section) ==== -->
  <dialog class="dialog" id="dialog" aria-labelledby="dialogTitle">
    <div class="dialog__bar">
      <button class="icon-btn" id="dialogClose" type="button" aria-label="關閉 / Close">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
    <div class="dialog__body" id="dialogBody"></div>
  </dialog>

  <!-- ==== Footer ==== -->
  <footer class="footer">
    <p id="footerText">一份經過整理的雙語檔案,收錄創辦人公開分享的創投恐怖故事。故事版權皆屬原作者。</p>
  </footer>

  <!-- ==== Scripts (order matters: data first) ==== -->
  <script src="data/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
